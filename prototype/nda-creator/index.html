<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prelegal – Mutual NDA Creator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --forest:      #1a3a2a;
      --forest-mid:  #234d38;
      --forest-light:#2e6347;
      --sage:        #7aaa8a;
      --gold:        #c9a84c;
      --gold-light:  #e6c97a;
      --cream:       #f7f3ec;
      --parchment:   #ede8de;
      --ink:         #1c1c1c;
      --ink-muted:   #4a4a4a;
      --rule:        #d0c9bb;
      --white:       #ffffff;
      --shadow:      rgba(26, 58, 42, 0.12);
    }

    html, body {
      height: 100%;
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      color: var(--ink);
      background-color: var(--cream);
      background-image:
        linear-gradient(0deg, rgba(26,58,42,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(26,58,42,0.03) 1px, transparent 1px);
      background-size: 48px 48px;
    }

    /* ── HEADER ── */
    header {
      background: var(--forest);
      padding: 0 3rem;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 2px solid var(--gold);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .logo-mark {
      width: 32px;
      height: 32px;
      border: 2px solid var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-mark svg {
      width: 16px;
      height: 16px;
      fill: var(--gold);
    }

    .logo-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem;
      font-weight: 500;
      color: var(--white);
      letter-spacing: 0.08em;
    }

    .logo-text span { color: var(--gold); }

    .header-badge {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 0.85rem;
      color: var(--sage);
      letter-spacing: 0.06em;
    }

    /* ── HERO STRIP ── */
    .hero {
      background: var(--forest-mid);
      padding: 2.5rem 3rem;
      border-bottom: 1px solid var(--forest-light);
    }

    .hero-inner {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 2rem;
    }

    .hero h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.6rem;
      font-weight: 300;
      color: var(--white);
      letter-spacing: 0.04em;
      line-height: 1.1;
    }

    .hero h1 em { font-style: italic; color: var(--gold-light); }

    .hero p {
      font-size: 0.8rem;
      font-weight: 400;
      color: var(--sage);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-top: 0.6rem;
    }

    .hero-rule {
      width: 60px;
      height: 2px;
      background: var(--gold);
      margin-top: 1rem;
    }

    .hero-meta { text-align: right; }

    .hero-meta .doc-type {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.3rem;
    }

    .hero-meta .jurisdiction {
      font-size: 0.75rem;
      color: var(--sage);
      letter-spacing: 0.08em;
    }

    /* ── MAIN LAYOUT ── */
    main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2.5rem 3rem;
      display: grid;
      grid-template-columns: 420px 1fr;
      gap: 2.5rem;
      align-items: start;
    }

    /* ── FORM PANEL ── */
    .form-panel {
      background: var(--white);
      border: 1px solid var(--rule);
      border-top: 3px solid var(--forest);
      padding: 2rem;
      position: sticky;
      top: 88px;
    }

    .panel-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--forest);
      padding-bottom: 1rem;
      margin-bottom: 1rem;
      border-bottom: 1px solid var(--rule);
    }

    /* ── VOORTGANGSBALK ── */
    .progress-wrap {
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--rule);
    }

    .progress-track {
      height: 3px;
      background: var(--parchment);
      margin-bottom: 0.45rem;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(to right, var(--forest), var(--gold));
      transition: width 0.35s ease;
      width: 0%;
    }

    .progress-label {
      font-size: 0.68rem;
      font-weight: 400;
      letter-spacing: 0.1em;
      color: var(--ink-muted);
    }

    .progress-label strong {
      color: var(--forest);
      font-weight: 600;
    }

    /* ── FORM SECTIONS & FIELDS ── */
    .form-section { margin-bottom: 1.8rem; }

    .section-label {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1rem;
      padding-bottom: 0.4rem;
      border-bottom: 1px solid var(--parchment);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .section-label::before {
      content: '';
      width: 12px;
      height: 1px;
      background: var(--gold);
      flex-shrink: 0;
    }

    .field { margin-bottom: 1rem; }

    .field label {
      display: block;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-muted);
      margin-bottom: 0.35rem;
    }

    .field label .opt {
      font-weight: 300;
      text-transform: none;
      letter-spacing: 0;
      color: var(--sage);
      font-style: italic;
      margin-left: 0.3rem;
    }

    .field input,
    .field textarea {
      width: 100%;
      padding: 0.6rem 0.8rem;
      border: 1px solid var(--rule);
      background: var(--cream);
      color: var(--ink);
      font-family: 'Jost', sans-serif;
      font-size: 0.85rem;
      font-weight: 300;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
      border-radius: 0;
    }

    .field input:focus,
    .field textarea:focus {
      border-color: var(--forest-light);
      background: var(--white);
    }

    .field input[type="number"] {
      appearance: none;
      -moz-appearance: textfield;
    }

    .field textarea {
      resize: vertical;
      min-height: 80px;
      line-height: 1.5;
    }

    .field-row {
      display: grid;
      grid-template-columns: 1fr 100px;
      gap: 0.75rem;
    }

    /* ── KNOPPEN ── */
    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }

    .download-btn {
      width: 100%;
      padding: 0.85rem 1.5rem;
      background: var(--forest);
      color: var(--white);
      border: 1.5px solid transparent;
      font-family: 'Jost', sans-serif;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
    }

    .download-btn:hover { background: var(--forest-light); }

    .download-btn--secondary {
      background: transparent;
      color: var(--forest);
      border-color: var(--rule);
    }

    .download-btn--secondary:hover {
      background: var(--parchment);
      border-color: var(--forest);
    }

    .download-btn svg {
      width: 14px;
      height: 14px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
    }

    /* ── DOCUMENT PREVIEW ── */
    .preview-panel {
      background: var(--white);
      border: 1px solid var(--rule);
    }

    .preview-header {
      background: var(--forest);
      padding: 0.8rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .preview-header span {
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--sage);
    }

    .preview-header .live-dot {
      width: 6px;
      height: 6px;
      background: var(--gold);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .document {
      padding: 4rem 5rem;
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.95rem;
      line-height: 1.85;
      color: var(--ink);
      min-height: 800px;
    }

    .doc-watermark {
      text-align: center;
      margin-bottom: 3rem;
    }

    .doc-watermark .seal {
      width: 56px;
      height: 56px;
      border: 2px solid var(--forest);
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1rem;
    }

    .doc-watermark .seal svg {
      width: 24px;
      height: 24px;
      fill: var(--forest);
    }

    .doc-title {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-align: center;
      text-transform: uppercase;
      color: var(--forest);
      margin-bottom: 0.4rem;
    }

    .doc-subtitle {
      font-size: 0.9rem;
      font-style: italic;
      text-align: center;
      color: var(--ink-muted);
      margin-bottom: 0.3rem;
    }

    .doc-rule {
      width: 100%;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold), transparent);
      margin: 1.5rem 0;
    }

    .doc-body p { margin-bottom: 1rem; }

    .article-heading {
      font-weight: 600;
      font-size: 0.85rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--forest);
      margin-top: 1.8rem;
      margin-bottom: 0.6rem;
    }

    .article-text { font-size: 0.9rem; color: var(--ink); }

    .article-sub {
      padding-left: 1.5rem;
      font-size: 0.9rem;
      margin-bottom: 0.4rem;
    }

    .placeholder {
      color: var(--rule);
      font-style: italic;
      border-bottom: 1px dashed var(--rule);
      white-space: nowrap;
    }

    .filled {
      color: var(--forest);
      font-weight: 500;
      border-bottom: 1px solid var(--sage);
    }

    .signature-section {
      margin-top: 4rem;
      padding-top: 2rem;
      border-top: 1px solid var(--rule);
    }

    .signature-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4rem;
      margin-top: 1.5rem;
    }

    .sig-block .sig-label {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--ink-muted);
      margin-bottom: 0.4rem;
    }

    .sig-block .sig-name {
      font-size: 1rem;
      font-weight: 500;
      color: var(--forest);
      border-bottom: 1px solid var(--rule);
      padding-bottom: 2.5rem;
      margin-bottom: 0.5rem;
    }

    .sig-block .sig-line {
      font-size: 0.8rem;
      font-style: italic;
      color: var(--ink-muted);
    }

    .doc-footer {
      text-align: center;
      margin-top: 3rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--parchment);
      font-size: 0.75rem;
      color: var(--ink-muted);
      letter-spacing: 0.08em;
    }

    /* ── PAGE FADE IN ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .form-panel    { animation: fadeUp 0.5s ease both; animation-delay: 0.1s; }
    .preview-panel { animation: fadeUp 0.5s ease both; animation-delay: 0.2s; }

    /* ── RESPONSIVE ── */
    @media (max-width: 1024px) {
      main { grid-template-columns: 1fr; }
      .form-panel { position: static; }
      header { padding: 0 1.5rem; }
      .hero { padding: 2rem 1.5rem; }
      main { padding: 2rem 1.5rem; }
      .document { padding: 2.5rem 2rem; }
    }

    /* ══════════════════════════════════════════════════════════
       PRINT STYLESHEET — alleen actief bij window.print()
       ══════════════════════════════════════════════════════════ */
    @media print {

      @page {
        size: A4 portrait;
        margin: 20mm 25mm 20mm 25mm;
      }

      /* Verberg alle UI-elementen */
      header,
      .hero,
      .form-panel,
      .preview-header {
        display: none !important;
      }

      /* Reset pagina-achtergrond */
      html, body {
        background: white !important;
        background-image: none !important;
        color: #1c1c1c !important;
      }

      /* Layout terugzetten naar één kolom */
      main {
        display: block !important;
        max-width: none !important;
        padding: 0 !important;
        margin: 0 !important;
      }

      .preview-panel {
        border: none !important;
        width: 100% !important;
      }

      /* Document opmaak voor papier */
      .document {
        padding: 0 !important;
        font-family: 'Cormorant Garamond', Georgia, 'Times New Roman', serif;
        font-size: 10.5pt;
        line-height: 1.7;
        color: #1c1c1c !important;
        min-height: none !important;
      }

      .doc-title {
        font-size: 16pt;
        color: #1a3a2a !important;
      }

      .article-heading {
        font-size: 9pt;
        color: #1a3a2a !important;
        break-after: avoid;
        page-break-after: avoid;
      }

      .signature-section {
        break-inside: avoid;
        page-break-inside: avoid;
      }

      .sig-block {
        break-inside: avoid;
        page-break-inside: avoid;
      }

      /* Lege velden worden rood gemarkeerd als waarschuwing */
      .placeholder {
        color: #cc0000 !important;
        border-bottom: 1px solid #cc0000 !important;
        font-style: italic;
      }

      /* Ingevulde waarden: verwijder decoratieve groene onderlijn */
      .filled {
        color: #1c1c1c !important;
        border-bottom: none !important;
        font-weight: 600;
      }

      /* Gouden lijn: gradient werkt niet in print, gebruik solide lijn */
      .doc-rule {
        background: none !important;
        border-bottom: 1px solid #c9a84c !important;
        height: 1px !important;
      }

      /* Animaties uitzetten */
      *, *::before, *::after {
        animation: none !important;
        transition: none !important;
      }

      /* Voorkom dat browser URL's afdrukt na links */
      a[href]::after { content: none !important; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="logo">
      <div class="logo-mark">
        <svg viewBox="0 0 16 16"><path d="M8 1L10 6H15L11 9.5L12.5 14.5L8 11.5L3.5 14.5L5 9.5L1 6H6Z"/></svg>
      </div>
      <span class="logo-text">Pre<span>legal</span></span>
    </div>
    <span class="header-badge">Juridische documenten, vakkundig opgesteld</span>
  </header>

  <!-- HERO -->
  <div class="hero">
    <div class="hero-inner">
      <div>
        <h1>Mutual <em>Non-Disclosure</em><br>Agreement</h1>
        <p>Geheimhoudingsovereenkomst opstellen</p>
        <div class="hero-rule"></div>
      </div>
      <div class="hero-meta">
        <div class="doc-type">Documenttype — NDA / Mutual</div>
        <div class="jurisdiction">Toepasselijk recht: Nederlands recht</div>
      </div>
    </div>
  </div>

  <!-- MAIN -->
  <main>

    <!-- FORMULIER -->
    <div class="form-panel">
      <div class="panel-title">Gegevens invullen</div>

      <!-- VOORTGANGSBALK -->
      <div class="progress-wrap">
        <div class="progress-track">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <span class="progress-label" id="progress-label">Vul de verplichte velden in om te beginnen</span>
      </div>

      <div class="form-section">
        <div class="section-label">Partij 1</div>
        <div class="field">
          <label for="p1_naam">Naam of handelsnaam</label>
          <input type="text" id="p1_naam" placeholder="bijv. Innovatech B.V." oninput="scheduleUpdate()" />
        </div>
        <div class="field">
          <label for="p1_adres">Adres</label>
          <input type="text" id="p1_adres" placeholder="Straat 1, 1234 AB Stad" oninput="scheduleUpdate()" />
        </div>
        <div class="field">
          <label for="p1_kvk">KvK-nummer <span class="opt">(optioneel)</span></label>
          <input type="text" id="p1_kvk" placeholder="12345678" oninput="scheduleUpdate()" />
        </div>
      </div>

      <div class="form-section">
        <div class="section-label">Partij 2</div>
        <div class="field">
          <label for="p2_naam">Naam of handelsnaam</label>
          <input type="text" id="p2_naam" placeholder="bijv. Stratego Group B.V." oninput="scheduleUpdate()" />
        </div>
        <div class="field">
          <label for="p2_adres">Adres</label>
          <input type="text" id="p2_adres" placeholder="Straat 1, 1234 AB Stad" oninput="scheduleUpdate()" />
        </div>
        <div class="field">
          <label for="p2_kvk">KvK-nummer <span class="opt">(optioneel)</span></label>
          <input type="text" id="p2_kvk" placeholder="87654321" oninput="scheduleUpdate()" />
        </div>
      </div>

      <div class="form-section">
        <div class="section-label">Overeenkomst</div>
        <div class="field">
          <label for="doel">Doel van de samenwerking</label>
          <textarea id="doel" placeholder="Beschrijf het doel waarvoor informatie wordt uitgewisseld..." oninput="scheduleUpdate()"></textarea>
        </div>
        <div class="field field-row">
          <div>
            <label for="gemeente">Rechtbank (gemeente)</label>
            <input type="text" id="gemeente" placeholder="Amsterdam" oninput="scheduleUpdate()" />
          </div>
          <div>
            <label for="duur">Duur (jaren)</label>
            <input type="number" id="duur" value="2" min="1" max="10" oninput="scheduleUpdate()" />
          </div>
        </div>
        <div class="field">
          <label for="datum">Datum ondertekening</label>
          <input type="date" id="datum" oninput="scheduleUpdate()" />
        </div>
      </div>

      <div class="btn-group">
        <button class="download-btn" onclick="printDoc()">
          <svg viewBox="0 0 24 24"><path d="M6 9V2h12v7M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2M6 14h12v8H6z"/></svg>
          Opslaan als PDF
        </button>
        <button class="download-btn download-btn--secondary" onclick="downloadTxt()">
          <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
          Downloaden als .txt
        </button>
      </div>
    </div>

    <!-- DOCUMENT PREVIEW -->
    <div class="preview-panel">
      <div class="preview-header">
        <span>Documentvoorbeeld</span>
        <div class="live-dot"></div>
      </div>
      <div class="document" id="doc-preview">
        <!-- filled by JS -->
      </div>
    </div>

  </main>

  <script>
    // ── VERPLICHTE VELDEN ────────────────────────────────────────────────────────
    // 'duur' staat niet in REQUIRED omdat het al een standaardwaarde heeft (2 jaar).
    const REQUIRED = ['p1_naam', 'p1_adres', 'p2_naam', 'p2_adres', 'doel', 'gemeente', 'datum'];

    // ── HULPFUNCTIES ─────────────────────────────────────────────────────────────
    function val(id) {
      return document.getElementById(id)?.value?.trim() || '';
    }

    // Fix XSS: gebruikersinvoer wordt gesaneerd voordat het in innerHTML belandt.
    // Zo breekt invoer met <, >, & het document niet.
    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function span(text, isFilled) {
      const safe = escapeHtml(text);
      return isFilled
        ? `<span class="filled">${safe}</span>`
        : `<span class="placeholder">${safe}</span>`;
    }

    function f(id, fallback) {
      const v = val(id);
      return v ? span(v, true) : span(fallback, false);
    }

    function kvkClause(id) {
      const v = val(id);
      if (!v) return '';
      return `, ingeschreven in het handelsregister van de Kamer van Koophandel onder nummer ${span(v, true)}`;
    }

    function formatDate(id) {
      const v = val(id);
      if (!v) return span('datum', false);
      const d = new Date(v + 'T00:00:00'); // voorkom tijdzone-verschuiving
      return span(d.toLocaleDateString('nl-NL', { day: 'numeric', month: 'long', year: 'numeric' }), true);
    }

    // ── DEBOUNCE ─────────────────────────────────────────────────────────────────
    // Wacht 150ms na de laatste toetsaanslag voordat de preview wordt bijgewerkt.
    // Voorkomt onnodige hertekeningen bij snel typen.
    let _debounceTimer = null;
    function scheduleUpdate() {
      clearTimeout(_debounceTimer);
      _debounceTimer = setTimeout(updateDoc, 150);
    }
